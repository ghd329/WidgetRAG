<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload</title>
    <script src="https://kit.fontawesome.com/8f3f0f6f0f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/company.css">
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/company.js"></script>
</head>
<body onload="initPage()">
    <div class="company-layout">
        
        <aside class="sidebar">
            <h2>Biz Chatbot</h2>
            <ul>
                <li onclick="location.href='dashboard.html'">
                    <i class="fa-solid fa-chart-line"></i>관리자 홈
                </li>
                <li class="active" onclick="location.href='upload.html'">
                    <i class="fa-solid fa-file-arrow-up"></i>데이터 업로드
                </li>
                <li onclick="location.href='products.html'">
                    <i class="fa-solid fa-box"></i>상품 관리
                </li>
                <li onclick="location.href='questions.html'">
                    <i class="fa-solid fa-comments"></i>고객 질문 관리
                </li>
                <li onclick="location.href='answers.html'">
                    <i class="fa-solid fa-brain"></i>AI 답변 관리
                </li>
                <li onclick="location.href='script.html'">
                    <i class="fa-solid fa-code"></i>위젯 설치 코드
                </li>
                <li onclick="location.href='settings.html'">
                    <i class="fa-solid fa-gear"></i>설정
                </li>
            </ul>
        </aside>

        <main class="main">
            <div class="top">
                <div>
                    <h1>데이터 업로드</h1>
                    <p>CSV, TXT 파일을 업로드하여 상품 및 FAQ 데이터를 등록하세요.</p>
                </div>
                <div class="user-box">
                    <span>기업 관리자님</span>
                    <button class="logout" onclick="logout()">로그아웃</button>
                </div>
            </div>

            <div class="card upload-box">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <h3>파일 업로드</h3>
                <p>CSV 또는 TXT 파일만 업로드 가능합니다.</p>
                <input type="file" id="fileInput" accept=".csv,.txt">
                <br>
                <button class="primary-btn" onclick="uploadFile()">업로드</button>
            </div>

            <h2 class="section-title">업로드 이력</h2>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>파일명</th>
                            <th>형식</th>
                            <th>업로드 일시</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>products.csv</td>
                            <td>CSV</td>
                            <td>2026-06-24 14:30</td>
                            <td>성공</td>
                        </tr>
                        <tr>
                            <td>faq.txt</td>
                            <td>TXT</td>
                            <td>2026-06-24 15:10</td>
                            <td>성공</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

    </div>
</body>
</html>
