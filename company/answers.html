<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answers</title>
    <script src="https://kit.fontawesome.com/8f3f0f6f0f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/company.css">
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/company.js"></script>
</head>
<body onload="initPage()">
    <div class="company-layout">
        
        <aside class="sidebar">
            <h2>Biz Chatbot</h2>
            <ul>
                <li onclick="location.href='dashboard.html'">
                    <i class="fa-solid fa-chart-line"></i>관리자 홈
                </li>
                <li onclick="location.href='upload.html'">
                    <i class="fa-solid fa-file-arrow-up"></i>데이터 업로드
                </li>
                <li onclick="location.href='products.html'">
                    <i class="fa-solid fa-box"></i>상품 관리
                </li>
                <li onclick="location.href='questions.html'">
                    <i class="fa-solid fa-comments"></i>고객 질문 관리
                </li>
                <li class="active" onclick="location.href='answers.html'">
                    <i class="fa-solid fa-brain"></i>AI 답변 관리
                </li>
                <li onclick="location.href='script.html'">
                    <i class="fa-solid fa-code"></i>위젯 설치 코드
                </li>
                <li onclick="location.href='settings.html'">
                    <i class="fa-solid fa-gear"></i>설정
                </li>
            </ul>
        </aside>

        <main class="main">
            <div class="top">
                <div>
                    <h1>AI 답변 관리</h1>
                    <p>AI가 생성한 답변을 확인하고 수정합니다.</p>
                </div>
                <div class="user-box">
                    <span>기업 관리자님</span>
                    <button class="logout" onclick="logout()">로그아웃</button>
                </div>
            </div>

            <div class="grid-2">
                <div class="card">
                    <h3 style="margin-bottom: 15px;">질문 리스트</h3>
                    <div class="question-item">배송은 얼마나 걸리나요?</div>
                    <div class="question-item">교환이나 환불이 가능한가요?</div>
                    <div class="question-item">사이즈 추천 가능할까요?</div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 15px;">AI 답변</h3>
                    <textarea class="answer-box">일반 배송은 결제 완료 후 평균 2~3일 정도 소요됩니다.</textarea>
                    <button class="primary-btn" style="margin-top: 15px;" onclick="saveAnswer()">답변 저장</button>
                </div>
            </div>
        </main>

    </div>
</body>
</html>
