<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객 챗봇</title>

    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/customer.css">
    <link rel="stylesheet" href="../assets/css/chatbot-widget.css">

    <script src="../assets/js/customer.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/chatbot-widget.js"></script>
</head>

<body class="customer-body">
    <!-- 챗봇 위젯 -->
    <div id="chatbotBubble" onclick="openChatbot()">
        🤖
    </div>

    <div id="chatbotWidget">
        <div class="chatbot-header">
            <div>
                <strong>AI 쇼핑 도우미</strong>
                <p>상품 데이터를 기반으로 추천해드려요</p>
            </div>
            <button onclick="closeChatbot()">×</button>
        </div>

        <div id="chatbotMessages" class="chatbot-messages">
            <div class="bot-message">
                안녕하세요! 원하는 상품 조건을 말해주시면 추천해드릴게요.
            </div>

            <div class="quick-buttons">
                <button onclick="quickAsk('3만원 이하 상품 추천해줘')">3만원 이하 추천</button>
                <button onclick="quickAsk('여름에 입기 좋은 옷 추천해줘')">여름 옷 추천</button>
                <button onclick="quickAsk('친구 생일 선물 추천해줘')">선물 추천</button>
            </div>
        </div>

        <div class="chatbot-input">
            <input id="chatbotInput"
                placeholder="질문을 입력하세요"
                onkeydown="if(event.key==='Enter') sendChatbotMessage()">
            <button onclick="sendChatbotMessage()">➤</button>
        </div>
    </div>

    <style>
    #chatbotBubble {
        position: fixed;
        right: 32px;
        bottom: 32px;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #2563eb;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(37,99,235,.35);
        z-index: 9999;
    }

    #chatbotWidget {
        position: fixed;
        right: 32px;
        bottom: 110px;
        width: 390px;
        height: 560px;
        background: white;
        border-radius: 26px;
        box-shadow: 0 20px 60px rgba(0,0,0,.22);
        display: none;
        flex-direction: column;
        overflow: hidden;
        z-index: 9999;
    }

    .chatbot-header {
        padding: 22px;
        background: #f8fafc;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chatbot-header p {
        margin-top: 4px;
        font-size: 13px;
        color: #6b7280;
    }

    .chatbot-header button {
        border: none;
        background: #e5e7eb;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 22px;
        cursor: pointer;
    }

    .chatbot-messages {
        flex: 1;
        padding: 18px;
        overflow-y: auto;
        background: #f9fafb;
    }

    .bot-message,
    .user-message {
        max-width: 80%;
        padding: 12px 14px;
        border-radius: 16px;
        margin-bottom: 12px;
        line-height: 1.5;
        font-size: 14px;
    }

    .bot-message {
        background: white;
        color: #111827;
        border: 1px solid #e5e7eb;
    }

    .user-message {
        background: #2563eb;
        color: white;
        margin-left: auto;
    }

    .quick-buttons {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
    }

    .quick-buttons button {
        border: none;
        background: #eef4ff;
        color: #2563eb;
        padding: 11px;
        border-radius: 12px;
        font-weight: 800;
        cursor: pointer;
    }

    .chatbot-input {
        display: flex;
        gap: 8px;
        padding: 14px;
        border-top: 1px solid #e5e7eb;
    }

    .chatbot-input input {
        flex: 1;
        border: 1px solid #d1d5db;
        border-radius: 14px;
        padding: 12px;
        outline: none;
    }

    .chatbot-input button {
        width: 46px;
        border: none;
        border-radius: 14px;
        background: #2563eb;
        color: white;
        font-weight: 900;
        cursor: pointer;
    }

    /* ▼▼▼ 상품 카드 스타일 추가 ▼▼▼ */
    .product-cards {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px;
    }

    .product-card {
        display: flex;
        align-items: center;
        gap: 12px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 10px;
        text-decoration: none;
        color: inherit;
        transition: box-shadow .15s, transform .15s;
    }

    a.product-card:hover {
        box-shadow: 0 6px 18px rgba(0,0,0,.10);
        transform: translateY(-1px);
        cursor: pointer;
    }

    .product-card-img img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 10px;
        background: #f3f4f6;
    }

    .product-card-info {
        min-width: 0;
    }

    .product-card-name {
        font-size: 13px;
        font-weight: 700;
        color: #111827;
        margin: 0 0 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .product-card-price {
        font-size: 13px;
        font-weight: 800;
        color: #2563eb;
        margin: 0;
    }
    /* ▲▲▲ 상품 카드 스타일 추가 ▲▲▲ */
    </style>

    <script>
    const CLIENT_CODE = "shop_56d80286";

    function openChatbot() {
        document.getElementById("chatbotWidget").style.display = "flex";
        document.getElementById("chatbotBubble").style.display = "none";
    }

    function closeChatbot() {
        document.getElementById("chatbotWidget").style.display = "none";
        document.getElementById("chatbotBubble").style.display = "flex";
    }

    function quickAsk(text) {
        document.getElementById("chatbotInput").value = text;
        sendChatbotMessage();
    }

    function appendMessage(type, text) {
        const messages = document.getElementById("chatbotMessages");
        const div = document.createElement("div");

        div.className = type === "user" ? "user-message" : "bot-message";
        div.innerText = text;

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    // ▼▼▼ 상품 카드 렌더링 함수 추가 ▼▼▼
    function appendProductCards(products) {
        if (!products || products.length === 0) return;

        const messages = document.getElementById("chatbotMessages");
        const wrap = document.createElement("div");
        wrap.className = "product-cards";

        products.forEach(p => {
            const hasUrl = !!p.productUrl;
            const card = document.createElement(hasUrl ? "a" : "div");
            card.className = "product-card";

            if (hasUrl) {
                card.href = p.productUrl;
                card.target = "_blank";
                card.rel = "noopener noreferrer";
            }

            const priceText = (typeof p.price === "number")
                ? p.price.toLocaleString() + "원"
                : "";

            card.innerHTML = `
                <div class="product-card-img">
                    <img src="https://via.placeholder.com/100x100.png?text=Product" alt="${p.productName ?? ""}">
                </div>
                <div class="product-card-info">
                    <p class="product-card-name">${p.productName ?? ""}</p>
                    <p class="product-card-price">${priceText}</p>
                </div>
            `;

            wrap.appendChild(card);
        });

        messages.appendChild(wrap);
        messages.scrollTop = messages.scrollHeight;
    }
    // ▲▲▲ 상품 카드 렌더링 함수 추가 ▲▲▲

    async function sendChatbotMessage() {
        const input = document.getElementById("chatbotInput");
        const question = input.value.trim();

        if (!question) return;

        appendMessage("user", question);
        input.value = "";

        appendMessage("bot", "답변을 생성하는 중입니다...");

        try {
            const response = await fetch(`${CHATBOT_API_BASE}/api/chatbot/ask`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    clientCode: CLIENT_CODE,
                    question: question
                })
            });

            if (!response.ok) {
                throw new Error(await response.text());
            }

            const result = await response.json();

            const messages = document.getElementById("chatbotMessages");
            messages.lastChild.remove();

            appendMessage("bot", result.answer || "추천 답변을 찾지 못했습니다.");

            // ▼▼▼ 추천 상품 카드 표시 추가 ▼▼▼
            appendProductCards(result.recommendedProducts);
            // ▲▲▲ 추천 상품 카드 표시 추가 ▲▲▲

        } catch (error) {
            console.error(error);

            const messages = document.getElementById("chatbotMessages");
            messages.lastChild.remove();

            appendMessage("bot", "답변을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.");
        }
    }
    </script>
</body>
</html>
