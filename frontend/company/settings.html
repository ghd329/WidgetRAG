<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/company.css">
    <link rel="stylesheet" href="../assets/css/ui-feedback.css">

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/company.js"></script>
    <script src="../assets/js/ui-feedback.js"></script>

    <style>
        body.dark-mode {
            background: #111827;
            color: #f9fafb;
        }

        body.dark-mode .main {
            background: #111827;
        }

        body.dark-mode .card {
            background: #1f2937;
            color: #f9fafb;
        }

        body.dark-mode .top p,
        body.dark-mode .card p {
            color: #d1d5db !important;
        }

        body.dark-mode input,
        body.dark-mode select {
            background: #374151;
            color: #f9fafb;
            border: 1px solid #4b5563;
        }

        body.dark-mode .sidebar {
            background: #030712;
        }

        body.dark-mode .sidebar li.active,
        body.dark-mode .sidebar li:hover {
            background: #2563eb;
        }
    </style>
</head>

<body onload="initSettingsPage()">
    <div class="company-layout">

        <aside class="sidebar">
            <h2>Biz Chatbot</h2>

            <ul>
                <li onclick="location.href='dashboard.html'">
                    <i class="fa-solid fa-chart-line"></i>관리자 홈
                </li>

                <li onclick="location.href='upload.html'">
                    <i class="fa-solid fa-file-arrow-up"></i>데이터 업로드
                </li>

                <li onclick="location.href='products.html'">
                    <i class="fa-solid fa-box"></i>상품 관리
                </li>

                <li onclick="location.href='questions.html'">
                    <i class="fa-solid fa-comments"></i>고객 질문 관리
                </li>

                <li class="owner-only" onclick="location.href='members.html'">
                    <i class="fa-solid fa-user-check"></i>사원 승인 관리
                </li>

                <li onclick="location.href='script.html'">
                    <i class="fa-solid fa-code"></i>위젯 설치 코드
                </li>

                <li class="active" onclick="location.href='settings.html'">
                    <i class="fa-solid fa-gear"></i>설정
                </li>
            </ul>
        </aside>

        <main class="main">
            <div class="top">
                <div>
                    <h1>설정</h1>
                    <p>계정 정보와 화면 모드를 관리합니다.</p>
                </div>

                <div class="user-box">
                    <span id="companyNameLabel">기업 관리자님</span>
                    <button class="logout" onclick="logout()">로그아웃</button>
                </div>
            </div>

            <div class="card" style="max-width: 720px; margin-bottom: 25px;">
                <h3>비밀번호 변경</h3>

                <input type="password" id="currentPassword" placeholder="현재 비밀번호" style="margin-top: 15px;">
                <p class="uif-field-error" id="currentPasswordError"></p>

                <input type="password" id="newPassword" placeholder="새 비밀번호">
                <p class="uif-field-error" id="newPasswordError"></p>

                <input type="password" id="newPasswordConfirm" placeholder="새 비밀번호 확인">
                <p class="uif-field-error" id="newPasswordConfirmError"></p>

                <button class="primary-btn" onclick="changePassword()">
                    변경하기
                </button>
            </div>

            <div class="card" style="max-width: 720px; margin-bottom: 25px;">
                <h3>디스플레이 모드</h3>

                <select id="themeSelect" style="margin-top: 15px;">
                    <option value="light">Light Mode</option>
                    <option value="dark">Dark Mode</option>
                </select>

                <button class="primary-btn" style="margin-top: 12px;" onclick="saveTheme()">
                    저장
                </button>
            </div>

            <div class="card" style="max-width: 720px;">
                <h3>회원탈퇴</h3>

                <p style="color: #777; margin: 12px 0 18px;">
                    회원탈퇴 시 등록된 상품 데이터와 챗봇 데이터가 삭제됩니다.
                </p>

                <button class="danger-btn" onclick="withdrawMember()">
                    회원탈퇴
                </button>
            </div>
        </main>

    </div>

    <div class="uif-modal-overlay" id="withdrawModal">
        <div class="uif-modal-box">
            <h3>회원탈퇴</h3>
            <p>
                정말 회원탈퇴를 진행하시겠습니까?
                등록된 상품 데이터와 챗봇 데이터가 모두 삭제되며 복구할 수 없습니다.
            </p>

            <input type="password" id="withdrawPassword" placeholder="현재 비밀번호" style="margin-top: 4px;">
            <p class="uif-field-error" id="withdrawPasswordError"></p>

            <div class="uif-modal-actions">
                <button class="uif-btn uif-btn-secondary" onclick="closeWithdrawModal()">취소</button>
                <button class="uif-btn uif-btn-danger" onclick="confirmWithdraw()">탈퇴하기</button>
            </div>
        </div>
    </div>

    <script>
        function initSettingsPage() {
            checkCompanyLogin();
            applyTheme();
            applyCompanyName();

            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                document.getElementById("themeSelect").value = "dark";
            } else {
                document.getElementById("themeSelect").value = "light";
            }
        }

        function saveTheme() {
            const theme = document.getElementById("themeSelect").value;

            localStorage.setItem("theme", theme);
            applyTheme();

            showToast("디스플레이 모드가 저장되었습니다.");
        }

        function applyTheme() {
            const theme = localStorage.getItem("theme");

            if (theme === "dark") {
                document.body.classList.add("dark-mode");
            } else {
                document.body.classList.remove("dark-mode");
            }
        }

        async function changePassword() {
            const passwordRegex =
    /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,20}$/;
            const memberId = localStorage.getItem("memberId");
            const currentPassword = document.getElementById("currentPassword").value.trim();
            const newPassword = document.getElementById("newPassword").value.trim();
            const newPasswordConfirm = document.getElementById("newPasswordConfirm").value.trim();

            setFieldError("currentPassword", "currentPasswordError", "");
            setFieldError("newPassword", "newPasswordError", "");
            setFieldError("newPasswordConfirm", "newPasswordConfirmError", "");

            let hasError = false;

            if (!currentPassword) {
                setFieldError("currentPassword", "currentPasswordError", "현재 비밀번호를 입력해 주세요.");
                hasError = true;
            }

            if (!newPassword) {
                setFieldError("newPassword", "newPasswordError", "새 비밀번호를 입력해 주세요.");
                hasError = true;
            } else if (!passwordRegex.test(newPassword)) {
                setFieldError("newPassword", "newPasswordError", "비밀번호는 영문, 숫자, 특수문자를 포함한 8~20자여야 합니다.");
                hasError = true;
            }

            if (!newPasswordConfirm) {
                setFieldError("newPasswordConfirm", "newPasswordConfirmError", "새 비밀번호 확인을 입력해 주세요.");
                hasError = true;
            } else if (newPassword && newPassword !== newPasswordConfirm) {
                setFieldError("newPasswordConfirm", "newPasswordConfirmError", "새 비밀번호가 일치하지 않습니다.");
                hasError = true;
            }

            if (hasError) {
                return;
            }

            const response = await fetch(`${BACKEND_BASE}/api/members/password`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "include",
                body: JSON.stringify({
                    memberId: Number(memberId),
                    currentPassword: currentPassword,
                    newPassword: newPassword,
                    newPasswordConfirm: newPasswordConfirm
                })
            });

            if (response.ok) {
                showToast("비밀번호가 변경되었습니다. 다시 로그인해 주세요.");
                localStorage.clear();

                setTimeout(() => {
                    location.href = "../login/company-login.html";
                }, 1500);
            } else {
                const errorText = await response.text();

                if (errorText.includes("현재 비밀번호")) {
                    setFieldError("currentPassword", "currentPasswordError", "현재 비밀번호가 일치하지 않습니다.");
                } else if (errorText.includes("새 비밀번호")) {
                    setFieldError("newPasswordConfirm", "newPasswordConfirmError", "새 비밀번호가 일치하지 않습니다.");
                } else {
                    showToast("비밀번호 변경에 실패했습니다.", "error");
                }
            }
        }

        function withdrawMember() {
            document.getElementById("withdrawPassword").value = "";
            setFieldError("withdrawPassword", "withdrawPasswordError", "");
            document.getElementById("withdrawModal").classList.add("show");
        }

        function closeWithdrawModal() {
            document.getElementById("withdrawModal").classList.remove("show");
        }

        async function confirmWithdraw() {
            const memberId = localStorage.getItem("memberId");
            const password = document.getElementById("withdrawPassword").value.trim();

            if (!password) {
                setFieldError("withdrawPassword", "withdrawPasswordError", "현재 비밀번호를 입력해 주세요.");
                return;
            }

            const response = await fetch(`${BACKEND_BASE}/api/members/withdraw`, {
                method: "DELETE",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "include",
                body: JSON.stringify({
                    memberId: Number(memberId),
                    password: password
                })
            });

            if (response.ok) {
                closeWithdrawModal();
                showToast("회원탈퇴가 완료되었습니다.");
                localStorage.clear();

                setTimeout(() => {
                    location.href = "../login/company-login.html";
                }, 1500);
            } else {
                setFieldError("withdrawPassword", "withdrawPasswordError", "비밀번호가 일치하지 않습니다.");
            }
        }
    </script>
</body>
</html>
