<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/company.css">

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/company.js"></script>

    <style>
        body.dark-mode {
            background: #111827;
            color: #f9fafb;
        }

        body.dark-mode .main {
            background: #111827;
        }

        body.dark-mode .card {
            background: #1f2937;
            color: #f9fafb;
        }

        body.dark-mode .top p,
        body.dark-mode .card p {
            color: #d1d5db !important;
        }

        body.dark-mode input,
        body.dark-mode select {
            background: #374151;
            color: #f9fafb;
            border: 1px solid #4b5563;
        }

        body.dark-mode .sidebar {
            background: #030712;
        }

        body.dark-mode .sidebar li.active,
        body.dark-mode .sidebar li:hover {
            background: #2563eb;
        }
    </style>
</head>

<body onload="initSettingsPage()">
    <div class="company-layout">

        <aside class="sidebar">
            <h2>Biz Chatbot</h2>

            <ul>
                <li onclick="location.href='dashboard.html'">
                    <i class="fa-solid fa-chart-line"></i>관리자 홈
                </li>

                <li onclick="location.href='upload.html'">
                    <i class="fa-solid fa-file-arrow-up"></i>데이터 업로드
                </li>

                <li onclick="location.href='products.html'">
                    <i class="fa-solid fa-box"></i>상품 관리
                </li>

                <li onclick="location.href='questions.html'">
                    <i class="fa-solid fa-comments"></i>고객 질문 관리
                </li>

                <li onclick="location.href='answers.html'">
                    <i class="fa-solid fa-brain"></i>AI 답변 관리
                </li>

                <li onclick="location.href='script.html'">
                    <i class="fa-solid fa-code"></i>위젯 설치 코드
                </li>

                <li class="active" onclick="location.href='settings.html'">
                    <i class="fa-solid fa-gear"></i>설정
                </li>
            </ul>
        </aside>

        <main class="main">
            <div class="top">
                <div>
                    <h1>설정</h1>
                    <p>계정 정보와 화면 모드를 관리합니다.</p>
                </div>

                <div class="user-box">
                    <span>기업 관리자님</span>
                    <button class="logout" onclick="logout()">로그아웃</button>
                </div>
            </div>

            <div class="card" style="max-width: 720px; margin-bottom: 25px;">
                <h3>비밀번호 변경</h3>

                <input type="password" placeholder="현재 비밀번호" style="margin-top: 15px;">
                <input type="password" placeholder="새 비밀번호">
                <input type="password" placeholder="새 비밀번호 확인">

                <button class="primary-btn" onclick="changePassword()">
                    변경하기
                </button>
            </div>

            <div class="card" style="max-width: 720px; margin-bottom: 25px;">
                <h3>디스플레이 모드</h3>

                <select id="themeSelect" style="margin-top: 15px;">
                    <option value="light">Light Mode</option>
                    <option value="dark">Dark Mode</option>
                </select>

                <button class="primary-btn" style="margin-top: 12px;" onclick="saveTheme()">
                    저장
                </button>
            </div>

            <div class="card" style="max-width: 720px;">
                <h3>회원탈퇴</h3>

                <p style="color: #777; margin: 12px 0 18px;">
                    회원탈퇴 시 등록된 상품 데이터와 챗봇 데이터가 삭제됩니다.
                </p>

                <button class="danger-btn">
                    회원탈퇴
                </button>
            </div>
        </main>

    </div>

    <script>
        function initSettingsPage() {
            checkCompanyLogin();
            applyTheme();

            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                document.getElementById("themeSelect").value = "dark";
            } else {
                document.getElementById("themeSelect").value = "light";
            }
        }

        function saveTheme() {

            const theme =
                document.getElementById("themeSelect").value;

            localStorage.setItem("theme", theme);

            applyTheme();

            alert("디스플레이 모드가 저장되었습니다.");
        }

        function applyTheme() {
            const theme = localStorage.getItem("theme");

            if (theme === "dark") {
                document.body.classList.add("dark-mode");
            } else {
                document.body.classList.remove("dark-mode");
            }
        }

        function changePassword() {
            alert("비밀번호가 변경되었습니다.");
        }
    </script>
</body>
</html>
