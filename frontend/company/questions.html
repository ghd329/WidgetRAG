<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/company.css">
    <link rel="stylesheet" href="../assets/css/ui-feedback.css">

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/company.js"></script>
    <script src="../assets/js/ui-feedback.js"></script>
</head>

<body onload="initQuestionsPage()">
    <div class="company-layout">

        <aside class="sidebar">
            <h2>Biz Chatbot</h2>

            <ul>
                <li onclick="location.href='dashboard.html'">
                    <i class="fa-solid fa-chart-line"></i>관리자 홈
                </li>

                <li onclick="location.href='upload.html'">
                    <i class="fa-solid fa-file-arrow-up"></i>데이터 업로드
                </li>

                <li onclick="location.href='products.html'">
                    <i class="fa-solid fa-box"></i>상품 관리
                </li>

                <li class="active" onclick="location.href='questions.html'">
                    <i class="fa-solid fa-comments"></i>고객 질문 관리
                </li>


                <li onclick="location.href='script.html'">
                    <i class="fa-solid fa-code"></i>위젯 설치 코드
                </li>

                <li onclick="location.href='settings.html'">
                    <i class="fa-solid fa-gear"></i>설정
                </li>
            </ul>
        </aside>

        <main class="main">
            <div class="top">
                <div>
                    <h1>고객 질문 관리</h1>
                    <p>고객 챗봇에서 입력된 질문과 AI 답변을 확인합니다.</p>
                </div>

                <div class="user-box">
                    <span id="companyNameLabel">기업 관리자님</span>
                    <button class="logout" onclick="logout()">로그아웃</button>
                </div>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>질문</th>
                            <th>AI 답변</th>
                            <th>질문 시간</th>
                            <th>상태</th>
                            <th>관리</th>
                        </tr>
                    </thead>

                    <tbody id="questionListBody">
                        <tr>
                            <td colspan="5" style="text-align:center; color:#777;">
                                아직 등록된 고객 질문이 없습니다.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

    </div>

    <script>
        function initQuestionsPage() {
            initPage();
            loadCustomerQuestions();
        }

        /**
         * 로그인한 회사(companyId)의 고객 질문/답변 기록을 백엔드(chat_log 테이블)에서 조회하여 표시한다.
         * 기존에는 localStorage("customerQuestions")를 사용했으나,
         * 브라우저(도메인) 전체에서 공유되어 여러 회사의 기록이 섞이는 문제가 있어 DB 조회 방식으로 변경했다.
         */
        async function loadCustomerQuestions() {
            const questionListBody = document.getElementById("questionListBody");

            questionListBody.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align:center; color:#777;">
                        질문 목록을 불러오는 중입니다.
                    </td>
                </tr>
            `;

            try {
                const response = await fetch(`${BACKEND_BASE}/api/chat-logs`, {
                    method: "GET",
                    credentials: "include"
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                const questionList = await response.json();

                renderQuestionList(questionList);

            } catch (error) {
                console.error(error);

                questionListBody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align:center; color:#777;">
                            질문 목록을 불러오지 못했습니다. 로그인 상태 또는 백엔드 API를 확인해주세요.
                        </td>
                    </tr>
                `;
            }
        }

        /**
         * 질문 목록 배열을 받아 테이블에 렌더링한다.
         * 각 행의 삭제 버튼에는 localStorage 배열 인덱스 대신 실제 DB의 chat_log id를 사용한다.
         */
        function renderQuestionList(questionList) {
            const questionListBody = document.getElementById("questionListBody");

            questionListBody.innerHTML = "";

            if (!questionList || questionList.length === 0) {
                questionListBody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align:center; color:#777;">
                            아직 등록된 고객 질문이 없습니다.
                        </td>
                    </tr>
                `;
                return;
            }

            questionList.forEach(item => {
                const row = document.createElement("tr");

                const dateText = item.createdAt
                    ? new Date(item.createdAt).toLocaleString("ko-KR")
                    : "-";
                const statusText = item.isFallback ? "Fallback" : "답변 완료";

                row.innerHTML = `
                    <td>${item.question}</td>
                    <td>${item.answer ?? "-"}</td>
                    <td>${dateText}</td>
                    <td>${statusText}</td>
                    <td>
                        <button class="delete" onclick="deleteQuestion(${item.id})">
                            삭제
                        </button>
                    </td>
                `;

                questionListBody.appendChild(row);
            });
        }

        /**
         * 질문 기록을 삭제한다.
         * TODO: 백엔드에 DELETE /api/chat-logs/{id} 엔드포인트 추가 필요.
         * 아직 삭제 API가 없어서, 추가되기 전까지는 삭제가 동작하지 않는다.
         */
        async function deleteQuestion(chatLogId) {
            const confirmed = await showConfirm("이 질문 내역을 삭제하시겠습니까?", {
                title: "질문 내역 삭제",
                confirmText: "삭제"
            });

            if (!confirmed) return;

            try {
                const response = await fetch(`${BACKEND_BASE}/api/chat-logs/${chatLogId}`, {
                    method: "DELETE",
                    credentials: "include"
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                await loadCustomerQuestions();

            } catch (error) {
                console.error(error);
                showToast("삭제 중 오류가 발생했습니다. " + error.message, "error");
            }
        }
    </script>
</body>
</html>
