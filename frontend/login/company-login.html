<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 로그인</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/api.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef4ff
        }
        .login-card {
            width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 22px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, .1)
        }
        h1 {
            margin-bottom: 10px;
            color: #1e2b3c
        }
        .desc {
            color: #777;
            margin-bottom: 25px
        }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 14px
        }
        .login-card button {
            width: 100%;
            margin-top: 8px
        }
        .signup-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            white-space: nowrap;
            font-size: 14px;
        }

        .signup-links a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-links .divider {
            color: #999;
        }

        .forgot-link {
            text-align: right;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .forgot-link a {
            font-size: 13px;
            color: #2563eb;
            text-decoration: none;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
    <h1>로그인</h1>
    <p class="desc">쇼핑몰 AI 챗봇 관리자 페이지입니다.</p>

    <form onsubmit="loginAsCompany(); return false;">

        <input type="email" id="email" placeholder="이메일">
        <div id="emailError" class="field-error"></div>

        <input type="password" id="password" placeholder="비밀번호">
        <div id="passwordError" class="field-error"></div>

        <button class="primary-btn" type="submit">로그인</button>

        <div id="loginMessage" class="login-message"></div>

        <div class="forgot-link">
            <a href="find-password.html">비밀번호를 잊으셨나요?</a>
        </div>

    </form>

    <div class="link signup-links">
        <span>계정이 없으신가요?</span>
        <a href="company-signup.html">기업 회원가입</a>
        <span class="divider">|</span>
        <a href="employee-signup.html">일반 회원가입</a>
    </div>

</div>
    <script>
        function clearLoginErrors() {
            document.getElementById("email").classList.remove("error");
            document.getElementById("password").classList.remove("error");

            document.getElementById("emailError").style.display = "none";
            document.getElementById("passwordError").style.display = "none";
            document.getElementById("loginMessage").style.display = "none";
        }

        function showFieldError(inputId, errorId, message) {
            document.getElementById(inputId).classList.add("error");

            const errorBox = document.getElementById(errorId);
            errorBox.innerText = message;
            errorBox.style.display = "block";
        }

        function showLoginMessage(message) {
            const box = document.getElementById("loginMessage");
            box.innerText = message;
            box.style.display = "block";
        }

        async function loginAsCompany() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            clearLoginErrors();

            if (!email) {
                showFieldError("email", "emailError", "이메일을 입력해 주세요.");
                return;
            }

            if (!password) {
                showFieldError("password", "passwordError", "비밀번호를 입력해 주세요.");
                return;
            }

            try {
                const response = await fetch(`${BACKEND_BASE}/api/members/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText);
                }

                const result = await response.json();

                localStorage.setItem("isLogin", "true");
                localStorage.setItem("email", result.email);
                localStorage.setItem("companyEmail", result.email);
                localStorage.setItem("companyId", result.companyId);
                localStorage.setItem("clientCode", result.clientCode);
                localStorage.setItem("memberId", result.memberId);
                localStorage.setItem("companyName", result.companyName);
                localStorage.setItem("role", result.role);

                if (result.role === "ADMIN") {
                    localStorage.setItem("userType", "admin");
                    location.href = "../admin/company-approval.html";
                } else if (result.role === "COMPANY_OWNER") {
                    localStorage.setItem("userType", "company");
                    localStorage.setItem("isCompanyLogin", "true");
                    location.href = "../company/dashboard.html";
                } else if (result.role === "EMPLOYEE") {
                    localStorage.setItem("userType", "company");
                    localStorage.setItem("isCompanyLogin", "true");
                    location.href = "../company/dashboard.html";
                } else {
                    showLoginMessage("알 수 없는 권한입니다.");
                }

            } catch (error) {
                console.error(error);
                showLoginMessage("이메일 또는 비밀번호가 올바르지 않거나 승인 대기 중입니다.");
            }
        }
    </script>
</body>
</html>
