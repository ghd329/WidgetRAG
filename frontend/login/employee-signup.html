<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일반 회원가입</title>
    <link rel="stylesheet" href="../assets/css/common.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef4ff;
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
        }

        .signup-card {
            width: 440px;
            background: #fff;
            padding: 40px;
            border-radius: 22px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, .1);
        }

        h1 {
            margin-bottom: 10px;
            color: #1e2b3c;
        }

        .desc {
            color: #777;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 14px;
            font-size: 15px;
        }

        select {
            background: white;
        }

        .signup-card button {
            width: 100%;
            margin-top: 8px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        .signup-card button:hover {
            background: #1d4ed8;
        }

        .link {
            margin-top: 18px;
            text-align: center;
            color: #666;
        }

        .link a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }

        .message {
            display: none;
            margin-top: 14px;
            font-size: 14px;
            color: #dc2626;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="signup-card">
    <h1>일반 회원가입</h1>
    <p class="desc">
        승인된 기업을 선택한 뒤 사원 계정을 생성하세요.
    </p>

    <form onsubmit="signupEmployee(); return false;">
        <select id="clientCode">
            <option value="">회사를 선택하세요</option>
        </select>

        <input type="text" id="name" placeholder="이름">
        <input type="email" id="email" placeholder="이메일">
        <input type="password" id="password" placeholder="비밀번호">

        <button type="submit">회원가입</button>

        <div id="signupMessage" class="message"></div>
    </form>

    <div class="link">
        이미 계정이 있으신가요?
        <a href="company-login.html">로그인</a>
    </div>
</div>

<script>
const API_BASE = "http://localhost:8080";

function showMessage(message, color = "#dc2626") {
    const box = document.getElementById("signupMessage");
    box.innerText = message;
    box.style.color = color;
    box.style.display = "block";
}

async function loadApprovedCompanies() {
    const select = document.getElementById("clientCode");

    try {
        const response = await fetch(`${API_BASE}/api/companies/approved`);

        if (!response.ok) {
            throw new Error("회사 목록을 불러오지 못했습니다.");
        }

        const companies = await response.json();

        companies.forEach(company => {
            if (company.clientCode === "SYSTEM") return;

            const option = document.createElement("option");
            option.value = company.clientCode;
            option.textContent = company.companyName;
            select.appendChild(option);
        });

    } catch (error) {
        console.error(error);
        showMessage("승인된 회사 목록을 불러오지 못했습니다.");
    }
}

async function signupEmployee() {
    const clientCode = document.getElementById("clientCode").value;
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!clientCode) {
        showMessage("회사를 선택해 주세요.");
        return;
    }

    if (!name) {
        showMessage("이름을 입력해 주세요.");
        return;
    }

    if (!email) {
        showMessage("이메일을 입력해 주세요.");
        return;
    }

    if (!password) {
        showMessage("비밀번호를 입력해 주세요.");
        return;
    }

    try {
        const response = await fetch(`${API_BASE}/api/members/join`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify({
                clientCode: clientCode,
                name: name,
                email: email,
                password: password
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText);
        }

        showMessage("일반 회원가입이 완료되었습니다. 소속 기업 담당자 승인 후 로그인이 가능합니다.", "#16a34a");

        setTimeout(() => {
            location.href = "company-login.html";
        }, 1000);

    } catch (error) {
        console.error(error);
        showMessage("회원가입에 실패했습니다.");
    }
}

loadApprovedCompanies();
</script>

</body>
</html>
