<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 찾기</title>
    <link rel="stylesheet" href="../assets/css/common.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef4ff;
        }

        .card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 22px;
            box-shadow: 0 12px 35px rgba(0,0,0,.1);
        }

        h1 {
            margin-bottom: 10px;
            color: #1e2b3c;
        }

        .desc {
            color: #777;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        .result-box {
            display: none;
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            background: #f0fdf4;
            color: #166534;
            font-weight: 700;
            word-break: break-all;
        }

        .error-box {
            display: none;
            margin-top: 14px;
            color: #dc2626;
            font-size: 14px;
        }

        .link {
            margin-top: 18px;
            text-align: center;
        }

        .link a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>
<div class="card">
    <h1>비밀번호 찾기</h1>
    <p class="desc">
        가입한 이메일을 입력하면 임시 비밀번호가 발급됩니다.<br>
        로그인 후 설정에서 비밀번호를 변경해 주세요.
    </p>

    <input type="email" id="email" placeholder="가입한 이메일">

    <button onclick="findPassword()">임시 비밀번호 발급</button>

    <div id="resultBox" class="result-box"></div>
    <div id="errorBox" class="error-box"></div>

    <div class="link">
        <a href="company-login.html">로그인으로 돌아가기</a>
    </div>
</div>

<script>
const API_BASE = "http://localhost:8080";

async function findPassword() {
    const email = document.getElementById("email").value.trim();
    const resultBox = document.getElementById("resultBox");
    const errorBox = document.getElementById("errorBox");

    resultBox.style.display = "none";
    errorBox.style.display = "none";

    if (!email) {
        errorBox.innerText = "이메일을 입력해 주세요.";
        errorBox.style.display = "block";
        return;
    }

    try {
        const response = await fetch(`${API_BASE}/api/members/find-password`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email
            })
        });

        if (!response.ok) {
            throw new Error(await response.text());
        }

        const tempPassword = await response.text();

        resultBox.innerHTML = `
            임시 비밀번호가 발급되었습니다.<br><br>
            <strong>${tempPassword}</strong><br><br>
            로그인 후 반드시 비밀번호를 변경해 주세요.
        `;
        resultBox.style.display = "block";

    } catch (error) {
        console.error(error);
        errorBox.innerText = "가입된 이메일을 찾을 수 없습니다.";
        errorBox.style.display = "block";
    }
}
</script>

</body>
</html>
