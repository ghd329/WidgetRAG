<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Shop</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Pretendard", sans-serif;
            background: #f8fafc;
            color: #111827;
        }

        .shop-header {
            height: 76px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 70px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #2563eb;
        }

        .nav {
            display: flex;
            gap: 22px;
            color: #374151;
            font-weight: 800;
        }

        .nav span {
            cursor: pointer;
        }

        .nav span:hover {
            color: #2563eb;
        }

        .shop-actions {
            display: flex;
            gap: 16px;
            font-size: 22px;
        }

        .hero {
            background: linear-gradient(135deg, #dbeafe, #eef4ff);
            padding: 75px 70px;
        }

        .hero-text h1 {
            font-size: 46px;
            line-height: 1.25;
            margin-bottom: 18px;
        }

        .hero-text p {
            font-size: 18px;
            color: #4b5563;
            margin-bottom: 28px;
        }

        .hero-btn {
            padding: 15px 26px;
            border: none;
            border-radius: 14px;
            background: #2563eb;
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
        }

        .shop-container {
            padding: 55px 70px 100px;
        }

        .section-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .section-top h2 {
            font-size: 30px;
        }

        .section-top p {
            color: #6b7280;
            margin-top: 7px;
        }

        .filter-box {
            display: flex;
            gap: 10px;
        }

        .filter-box input,
        .filter-box select {
            height: 44px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 0 14px;
            outline: none;
            background: white;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
        }

        .product-card {
            background: white;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,.06);
            transition: .25s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 35px rgba(0,0,0,.1);
        }

        .product-info {
            padding: 24px;
        }

        .product-category {
            display: inline-block;
            background: #eef4ff;
            color: #2563eb;
            font-size: 12px;
            font-weight: 800;
            padding: 6px 10px;
            border-radius: 999px;
            margin-bottom: 14px;
        }

        .product-info h3 {
            font-size: 18px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .product-desc {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .product-price {
            font-size: 20px;
            font-weight: 900;
            color: #111827;
        }

        .product-link {
            display: inline-block;
            margin-top: 12px;
            color: #2563eb;
            font-weight: 800;
            text-decoration: none;
        }

        .empty {
            grid-column: 1 / -1;
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            color: #777;
        }

        @media (max-width: 1100px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 760px) {
            .shop-header { padding: 0 24px; }
            .nav { display: none; }
            .hero { padding: 55px 24px; }
            .hero-text h1 { font-size: 34px; }
            .shop-container { padding: 40px 24px 90px; }
            .section-top { flex-direction: column; align-items: flex-start; gap: 18px; }
            .filter-box { width: 100%; flex-direction: column; }
            .filter-box input, .filter-box select { width: 100%; }
            .product-grid { grid-template-columns: repeat(1, 1fr); }
        }
    </style>
</head>

<body>
    <header class="shop-header">
        <div class="logo">Style Shop</div>

        <nav class="nav">
            <span onclick="setCategory('all')">전체</span>
            <span onclick="setCategory('상의')">상의</span>
            <span onclick="setCategory('하의')">하의</span>
            <span onclick="setCategory('아우터')">아우터</span>
            <span onclick="setCategory('원피스')">원피스</span>
            <span onclick="setCategory('가방')">가방</span>
        </nav>

        <div class="shop-actions">
            <span>🔍</span>
            <span>🛒</span>
        </div>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>오늘의 스타일을<br>AI와 함께 찾아보세요</h1>
            <p>관리자 페이지에서 업로드한 상품 데이터를 기반으로 쇼핑몰 상품을 표시합니다.</p>
            <button class="hero-btn" onclick="scrollToProducts()">상품 둘러보기</button>
        </div>
    </section>

    <main class="shop-container" id="productsSection">
        <div class="section-top">
            <div>
                <h2>상품 목록</h2>
                <p>업로드된 CSV 상품 데이터가 자동으로 표시됩니다.</p>
            </div>

            <div class="filter-box">
                <input id="searchInput" type="text" placeholder="상품 검색" oninput="renderProducts()">

                <select id="categoryFilter" onchange="renderProducts()">
                    <option value="all">전체 카테고리</option>
                </select>
            </div>
        </div>

        <div class="product-grid" id="productGrid">
            <div class="empty">
                상품을 불러오는 중입니다.
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "http://localhost:8080";
        const CLIENT_CODE = "shop_ae0e4488";
        let productsCache = [];

        function scrollToProducts() {
            document.getElementById("productsSection").scrollIntoView({ behavior: "smooth" });
        }

        function setCategory(category) {
            document.getElementById("categoryFilter").value = category;
            scrollToProducts();
            renderProducts();
        }

        function getValue(item, keys) {
            for (const key of keys) {
                if (item[key] !== undefined && item[key] !== null && item[key] !== "") {
                    return item[key];
                }
            }
            return "";
        }

        function normalizeCategory(category) {
            const text = String(category || "").toLowerCase();

            if (!text) return "기타";

            if (text.includes("니트") || text.includes("티셔츠") || text.includes("맨투맨") ||
                text.includes("후드") || text.includes("셔츠") || text.includes("블라우스") ||
                text.includes("top") || text.includes("tee") || text.includes("knit")) {
                return "상의";
            }

            if (text.includes("팬츠") || text.includes("바지") || text.includes("청바지") ||
                text.includes("슬랙스") || text.includes("레깅스") || text.includes("스커트") ||
                text.includes("bottom") || text.includes("pants") || text.includes("jean") || text.includes("skirt")) {
                return "하의";
            }

            if (text.includes("자켓") || text.includes("재킷") || text.includes("코트") ||
                text.includes("점퍼") || text.includes("가디건") || text.includes("아우터") ||
                text.includes("outer") || text.includes("jacket") || text.includes("coat") || text.includes("cardigan")) {
                return "아우터";
            }

            if (text.includes("원피스") || text.includes("dress")) {
                return "원피스";
            }

            if (text.includes("신발") || text.includes("슈즈") || text.includes("운동화") || text.includes("shoes")) {
                return "신발";
            }

            if (text.includes("가방") || text.includes("백") || text.includes("bag")) {
                return "가방";
            }

            if (text.includes("모자") || text.includes("악세") || text.includes("액세") ||
                text.includes("잡화") || text.includes("acc")) {
                return "잡화";
            }

            return "기타";
        }

        function normalizeProduct(item) {
            const rawCategory = getValue(item, [
                "category_main", "categoryMain", "mainCategory", "category"
            ]);

            const categories = item.categories || item.categoryNames || [];
            const firstCategory = Array.isArray(categories) && categories.length > 0
                ? categories[0]
                : rawCategory;

            return {
                id: getValue(item, ["id", "itemId", "productItemId"]),
                product_name: getValue(item, ["product_name", "productName", "itemName", "name"]),
                category_main: normalizeCategory(firstCategory),
                category_sub: firstCategory || "-",
                description: getValue(item, ["description", "productDescription", "content"]),
                price: getValue(item, ["price", "productPrice", "itemPrice"]),
                url: getValue(item, ["url", "productUrl", "link"])
            };
        }

        function loadCategories(products) {
            const categoryFilter = document.getElementById("categoryFilter");

            categoryFilter.innerHTML = `
                <option value="all">전체 카테고리</option>
            `;

            const categories = ["상의", "하의", "아우터", "원피스", "신발", "가방", "잡화", "기타"];

            categories.forEach(category => {
                if (products.some(item => item.category_main === category)) {
                    const option = document.createElement("option");
                    option.value = category;
                    option.innerText = category;
                    categoryFilter.appendChild(option);
                }
            });
        }

        function formatPrice(price) {
            if (!price) return "-";

            const numberPrice = String(price).replace(/[^0-9]/g, "");

            if (!numberPrice) return price;

            return Number(numberPrice).toLocaleString("ko-KR") + "원";
        }

        async function loadProducts() {
            const productGrid = document.getElementById("productGrid");

            try {
                productGrid.innerHTML = `<div class="empty">상품을 불러오는 중입니다.</div>`;

                const response = await fetch(`${API_BASE}/api/product-items/public/${CLIENT_CODE}`, {
                    method: "GET"
                });

                if (!response.ok) {
                    throw new Error("상품 목록 조회 실패");
                }

                const data = await response.json();
                console.log("shop products:", data);

                productsCache = Array.isArray(data)
                    ? data.map(normalizeProduct)
                    : [];

                loadCategories(productsCache);
                renderProducts();

            } catch (error) {
                console.error(error);

                productGrid.innerHTML = `
                    <div class="empty">
                        상품 데이터를 불러오지 못했습니다.<br>
                        백엔드 서버와 API 상태를 확인해주세요.
                    </div>
                `;
            }
        }

        function renderProducts() {
            const productGrid = document.getElementById("productGrid");
            const searchInput = document.getElementById("searchInput").value.trim().toLowerCase();
            const categoryFilter = document.getElementById("categoryFilter").value;

            let filteredProducts = [...productsCache];

            if (searchInput) {
                filteredProducts = filteredProducts.filter(item =>
                    String(item.product_name || "").toLowerCase().includes(searchInput) ||
                    String(item.category_main || "").toLowerCase().includes(searchInput) ||
                    String(item.category_sub || "").toLowerCase().includes(searchInput) ||
                    String(item.description || "").toLowerCase().includes(searchInput)
                );
            }

            if (categoryFilter !== "all") {
                filteredProducts = filteredProducts.filter(item =>
                    item.category_main === categoryFilter
                );
            }

            productGrid.innerHTML = "";

            if (filteredProducts.length === 0) {
                productGrid.innerHTML = `
                    <div class="empty">
                        표시할 상품이 없습니다.
                    </div>
                `;
                return;
            }

            filteredProducts.forEach(product => {

                const card = document.createElement("div");
                card.className = "product-card";

                if (product.url) {
                    card.onclick = () => {
                        window.open(product.url, "_blank");
                    };
                }

                card.innerHTML = `
                    <div class="product-info">

                        <span class="product-category">
                            ${product.category_main || "기타"}
                            ${product.category_sub ? " / " + product.category_sub : ""}
                        </span>

                        <h3>${product.product_name || "상품명 없음"}</h3>

                        <p class="product-desc">
                            ${product.description || "상품 설명이 없습니다."}
                        </p>

                        <div class="product-price">
                            ${formatPrice(product.price)}
                        </div>

                    </div>
                `;

                productGrid.appendChild(card);
            });
        }

        function injectWidget() {
            const script = document.createElement("script");
            script.src = `${API_BASE}/widget.js`;
            script.dataset.clientCode = CLIENT_CODE;
            script.dataset.backendBase = API_BASE;
            document.body.appendChild(script);
        }

        window.onload = () => {
            loadProducts();
            injectWidget();
        };
    </script>
    <script
    src="http://127.0.0.1:8080/widget.js"
    data-client-code="shop_067837f3">
</script>
</body>
</html>
