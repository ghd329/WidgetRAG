<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Shop</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Pretendard", sans-serif;
            background: #f8fafc;
            color: #111827;
        }

        .shop-header {
            height: 76px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 70px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #2563eb;
        }

        .nav {
            display: flex;
            gap: 28px;
            color: #374151;
            font-weight: 700;
        }

        .nav span {
            cursor: pointer;
        }

        .shop-actions {
            display: flex;
            gap: 16px;
            font-size: 22px;
        }

        .hero {
            background: linear-gradient(135deg, #dbeafe, #eef4ff);
            padding: 80px 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 48px;
            line-height: 1.25;
            margin-bottom: 20px;
        }

        .hero-text p {
            font-size: 18px;
            color: #4b5563;
            margin-bottom: 30px;
        }

        .hero-btn {
            padding: 15px 26px;
            border: none;
            border-radius: 14px;
            background: #2563eb;
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
        }

        .hero-visual {
            width: 320px;
            height: 320px;
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 45px rgba(37,99,235,.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
        }

        .shop-container {
            padding: 55px 70px 100px;
        }

        .section-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .section-top h2 {
            font-size: 30px;
        }

        .section-top p {
            color: #6b7280;
            margin-top: 7px;
        }

        .filter-box {
            display: flex;
            gap: 10px;
        }

        .filter-box input,
        .filter-box select {
            height: 44px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 0 14px;
            outline: none;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .product-card {
            background: white;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,.06);
            transition: .25s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 35px rgba(0,0,0,.1);
        }

        .product-img {
            height: 190px;
            background: linear-gradient(135deg, #eef4ff, #dbeafe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
        }

        .product-info {
            padding: 20px;
        }

        .product-category {
            display: inline-block;
            background: #eef4ff;
            color: #2563eb;
            font-size: 12px;
            font-weight: 800;
            padding: 6px 10px;
            border-radius: 999px;
            margin-bottom: 12px;
        }

        .product-info h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .product-desc {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            min-height: 42px;
            margin-bottom: 14px;
        }

        .product-price {
            font-size: 20px;
            font-weight: 900;
            color: #111827;
        }

        .empty {
            grid-column: 1 / -1;
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            color: #777;
        }

        @media (max-width: 1100px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .hero {
                flex-direction: column;
                gap: 35px;
                text-align: center;
            }
        }

        @media (max-width: 760px) {
            .shop-header {
                padding: 0 24px;
            }

            .nav {
                display: none;
            }

            .hero {
                padding: 60px 24px;
            }

            .shop-container {
                padding: 40px 24px 90px;
            }

            .section-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 18px;
            }

            .filter-box {
                width: 100%;
            }

            .filter-box input,
            .filter-box select {
                width: 100%;
            }

            .product-grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>

<body>
    <header class="shop-header">
        <div class="logo">Style Shop</div>

        <nav class="nav">
            <span>NEW</span>
            <span>BEST</span>
            <span>OUTER</span>
            <span>TOP</span>
            <span>BOTTOM</span>
        </nav>

        <div class="shop-actions">
            <span>🔍</span>
            <span>🛒</span>
        </div>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>오늘의 스타일을<br>AI와 함께 찾아보세요</h1>
            <p>업로드된 상품 데이터를 기반으로 쇼핑몰 상품을 보여주고, 챗봇이 상황에 맞는 상품을 추천합니다.</p>
            <button class="hero-btn" onclick="scrollToProducts()">상품 둘러보기</button>
        </div>

        <div class="hero-visual">
            👕
        </div>
    </section>

    <main class="shop-container" id="productsSection">
        <div class="section-top">
            <div>
                <h2>상품 목록</h2>
                <p>관리자 페이지에서 업로드한 CSV 상품 데이터가 표시됩니다.</p>
            </div>

            <div class="filter-box">
                <input id="searchInput" type="text" placeholder="상품 검색" oninput="renderProducts()">

                <select id="categoryFilter" onchange="renderProducts()">
                    <option value="all">전체 카테고리</option>
                </select>
            </div>
        </div>

        <div class="product-grid" id="productGrid">
            <div class="empty">
                등록된 상품이 없습니다. 관리자 페이지에서 상품 CSV를 업로드해주세요.
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "http://localhost:8080";
        let productsCache = [];

        function scrollToProducts() {
            document.getElementById("productsSection").scrollIntoView({
                behavior: "smooth"
            });
        }

        function getProductIcon(category) {
            if (!category) return "🛍️";

            if (category.includes("상의")) return "👕";
            if (category.includes("하의")) return "👖";
            if (category.includes("아우터")) return "🧥";
            if (category.includes("신발")) return "👟";
            if (category.includes("가방")) return "👜";
            if (category.includes("원피스")) return "👗";
            if (category.includes("스커트")) return "👗";
            if (category.includes("잡화")) return "🧢";
            if (category.includes("악세서리")) return "💍";

            return "🛍️";
        }

        function getValue(item, keys) {
            for (const key of keys) {
                if (item[key] !== undefined && item[key] !== null && item[key] !== "") {
                    return item[key];
                }
            }
            return "";
        }

        function normalizeProduct(item) {
            return {
                id: getValue(item, ["id", "itemId", "productItemId"]),
                product_name: getValue(item, ["product_name", "productName", "itemName", "name"]),
                category_main: getValue(item, ["category_main", "categoryMain", "mainCategory", "category"]),
                category_sub: getValue(item, ["category_sub", "categorySub", "subCategory"]),
                description: getValue(item, ["description", "productDescription", "content"]),
                price: getValue(item, ["price", "productPrice", "itemPrice"]),
                url: getValue(item, ["url", "productUrl", "link"])
            };
        }

        function loadCategories(products) {
            const categoryFilter = document.getElementById("categoryFilter");

            categoryFilter.innerHTML = `
                <option value="all">전체 카테고리</option>
            `;

            const categories = [
                ...new Set(
                    products
                        .map(item => item.category_main)
                        .filter(Boolean)
                )
            ];

            categories.forEach(category => {
                const option = document.createElement("option");
                option.value = category;
                option.innerText = category;
                categoryFilter.appendChild(option);
            });
        }

        function formatPrice(price) {
            if (!price) return "-";

            const numberPrice = String(price).replace(/[^0-9]/g, "");

            if (!numberPrice) return price;

            return Number(numberPrice).toLocaleString("ko-KR") + "원";
        }

        async function loadProducts() {
            const productGrid = document.getElementById("productGrid");

            try {
                productGrid.innerHTML = `
                    <div class="empty">
                        상품을 불러오는 중입니다.
                    </div>
                `;

                const response = await fetch(`${API_BASE}/api/product-items`);

                if (!response.ok) {
                    throw new Error("상품 목록 조회 실패");
                }

                const data = await response.json();

                productsCache = Array.isArray(data)
                    ? data.map(normalizeProduct)
                    : [];

                loadCategories(productsCache);
                renderProducts();

            } catch (error) {
                console.error(error);

                productGrid.innerHTML = `
                    <div class="empty">
                        상품 데이터를 불러오지 못했습니다.<br>
                        백엔드 서버와 API 상태를 확인해주세요.
                    </div>
                `;
            }
        }

        function renderProducts() {
            const productGrid = document.getElementById("productGrid");
            const searchInput = document.getElementById("searchInput").value.trim().toLowerCase();
            const categoryFilter = document.getElementById("categoryFilter").value;

            let filteredProducts = [...productsCache];

            if (searchInput) {
                filteredProducts = filteredProducts.filter(item =>
                    String(item.product_name || "").toLowerCase().includes(searchInput) ||
                    String(item.category_main || "").toLowerCase().includes(searchInput) ||
                    String(item.category_sub || "").toLowerCase().includes(searchInput) ||
                    String(item.description || "").toLowerCase().includes(searchInput)
                );
            }

            if (categoryFilter !== "all") {
                filteredProducts = filteredProducts.filter(item =>
                    item.category_main === categoryFilter
                );
            }

            productGrid.innerHTML = "";

            if (filteredProducts.length === 0) {
                productGrid.innerHTML = `
                    <div class="empty">
                        표시할 상품이 없습니다.
                    </div>
                `;
                return;
            }

            filteredProducts.forEach(product => {
                const card = document.createElement("div");
                card.className = "product-card";

                card.innerHTML = `
                    <div class="product-img">
                        ${getProductIcon(product.category_main)}
                    </div>

                    <div class="product-info">
                        <span class="product-category">
                            ${product.category_main || "기타"} / ${product.category_sub || "-"}
                        </span>

                        <h3>${product.product_name || "상품명 없음"}</h3>

                        <p class="product-desc">
                            ${product.description || "상품 설명이 없습니다."}
                        </p>

                        <div class="product-price">
                            ${formatPrice(product.price)}
                        </div>

                        <a href="${product.url || "#"}"
                        target="_blank"
                        style="display:inline-block; margin-top:12px; color:#2563eb; font-weight:800; text-decoration:none;">
                            상품 보러가기
                        </a>
                    </div>
                `;

                productGrid.appendChild(card);
            });
        }

        window.onload = function () {
            loadProducts();
        };
    </script>

    <!-- <script src="../assets/js/widget.js"></script> -->
</body>
</html>
